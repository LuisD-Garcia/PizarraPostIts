{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Iniciar sesión · Pizarra</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

    body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        background: radial-gradient(#444, #111);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .login-tarjeta {
        width: 100%;
        max-width: 380px;
        background: #1b1b1b;
        border-radius: 14px;
        padding: 40px 35px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        color: #eee;
    }

    .login-marca {
        text-align: center;
        margin-bottom: 30px;
    }

    .login-marca i {
        font-size: 2.2rem;
        color: #fff176;
    }

    .login-marca h1 {
        font-size: 1.5rem;
        margin: 10px 0 0;
        color: #fff;
    }

    .form-label {
        color: #ccc;
    }

    .form-control {
        background: #262626;
        border: 1px solid #3a3a3a;
        color: #fff;
    }

    .form-control:focus {
        background: #262626;
        border-color: #fff176;
        color: #fff;
        box-shadow: 0 0 0 0.2rem rgba(255, 241, 118, 0.15);
    }

    .btn-ingresar {
        background: #fff176;
        border: none;
        color: #111;
        font-weight: 600;
        padding: 10px 0;
        border-radius: 8px;
        width: 100%;
        margin-top: 10px;
        transition: filter 0.2s ease;
    }

    .btn-ingresar:hover {
        filter: brightness(0.92);
        color: #111;
    }

    .campo {
        margin-bottom: 18px;
    }

    .campo-icono {
        position: relative;
    }

    .campo-icono i {
        position: absolute;
        top: 50%;
        left: 14px;
        transform: translateY(-50%);
        color: #888;
    }

    .campo-icono input {
        padding-left: 40px;
    }

</style>

</head>

<body>

<div class="login-tarjeta">

    <div class="login-marca">
        <i class="bi bi-sticky-fill"></i>
        <h1>Pizarra</h1>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags|default:'info' }}{% endif %} py-2">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="campo">
            <label class="form-label" for="usuario">Usuario</label>
            <div class="campo-icono">
                <i class="bi bi-person-fill"></i>
                <input
                    type="text"
                    class="form-control"
                    id="usuario"
                    name="usuario"
                    placeholder="Tu usuario"
                    autofocus
                    required
                >
            </div>
        </div>

        <div class="campo">
            <label class="form-label" for="clave">Contraseña</label>
            <div class="campo-icono">
                <i class="bi bi-lock-fill"></i>
                <input
                    type="password"
                    class="form-control"
                    id="clave"
                    name="clave"
                    placeholder="Tu contraseña"
                    required
                >
            </div>
        </div>

        <button type="submit" class="btn-ingresar">
            <i class="bi bi-box-arrow-in-right me-1"></i> Ingresar
        </button>

    </form>

</div>

</body>
</html>
